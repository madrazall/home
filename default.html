<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}Madrazall Built</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<meta name="author" content="Madrazall Built">
<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --black: #0a0c0e;
  --dark: #0e1114;
  --dark-2: #131619;
  --dark-3: #1a1e22;
  --dark-4: #222730;
  --cyan: #00c8f0;
  --cyan-dim: rgba(0,200,240,0.08);
  --cyan-glow: 0 0 28px rgba(0,200,240,0.4);
  --gray: #5a6370;
  --gray-mid: #8a96a0;
  --gray-light: #b8c2cc;
  --white: #e8edf2;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 52px;
  background: rgba(10,12,14,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0,200,240,0.07);
}

.nav-logo { text-decoration: none; }

.nav-wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.18em;
  color: var(--white);
  line-height: 1;
}
.nav-wordmark span { color: var(--cyan); }

.nav-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gray);
  margin-top: 2px;
}

.nav-links {
  display: flex;
  gap: 40px;
  list-style: none;
}

.nav-links a {
  color: var(--gray-mid);
  text-decoration: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--cyan); }
.nav-links a.active { color: var(--cyan); }

.nav-cta {
  border: 1px solid var(--cyan);
  color: var(--cyan);
  background: transparent;
  padding: 10px 24px;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s, box-shadow 0.2s;
}
.nav-cta:hover {
  background: var(--cyan-dim);
  box-shadow: var(--cyan-glow);
}

/* ── FOOTER ── */
footer {
  background: var(--black);
  padding: 40px 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--dark-3);
  position: relative;
  z-index: 1;
}

.footer-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.16em;
  color: var(--white);
  opacity: 0.35;
}

.footer-copy {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  color: var(--gray);
  text-transform: uppercase;
  margin-top: 4px;
}

.footer-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.footer-links a {
  color: var(--gray);
  text-decoration: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.2s;
}

.footer-links a:hover { color: var(--cyan); }

/* ── REVEAL ── */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.65s ease, transform 0.65s ease;
}
.reveal.visible { opacity: 1; transform: none; }
.reveal-d1 { transition-delay: 0.1s; }
.reveal-d2 { transition-delay: 0.2s; }
.reveal-d3 { transition-delay: 0.3s; }

@media (max-width: 900px) {
  nav { padding: 16px 24px; }
  .nav-links { display: none; }
  footer { flex-direction: column; gap: 20px; text-align: center; padding: 32px 24px; }
}
</style>
</head>
<body>

{{ content }}

<script>
  // Reveal on scroll
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  reveals.forEach(el => observer.observe(el));
</script>

</body>
</html>
